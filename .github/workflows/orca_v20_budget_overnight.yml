# ORCA v20 — Budget Sprint Overnight PREMIUM Teacher
#
# Schedule: Mon-Fri 8:00 PM CDT = Tue-Sat 01:00 UTC
#
# This is the TEACHER layer — uses PREMIUM models (NOT cheap).
# Reviews cheap daytime outputs, writes replay labels and teacher feedback.
# State persisted via state branch.

name: ORCA v20 Budget Overnight

on:
  schedule:
    - cron: "0 1 * * 2-6"    # Tue-Sat 01:00 UTC = Mon-Fri 8:00 PM CDT
  workflow_dispatch:
    inputs:
      deep_review:
        description: "Deep review mode (premium Layer 3)"
        type: boolean
        default: false
      dry_run:
        description: "Dry run (no writes)"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: orca-v20-budget-overnight
  cancel-in-progress: false

env:
  PYTHONIOENCODING: utf-8
  # NOTE: ORCA_BUDGET_MODE is NOT set here.
  # Overnight uses PREMIUM models (normal RoleRouting) as the teacher.
  # Only the --budget CLI flag is passed to set the budget cap.
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
  GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
  TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
  TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

jobs:
  budget-overnight:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Restore persistent state
        run: |
          if git ls-remote --heads origin state | grep -q state; then
            echo "Restoring state from state branch..."
            git fetch origin state
            git checkout origin/state -- orca_v20.db 2>/dev/null && echo "  restored orca_v20.db" || echo "  no orca_v20.db yet"
            git checkout origin/state -- state/ 2>/dev/null && echo "  restored state/" || echo "  no state/ yet"
            git checkout origin/state -- artifacts/ 2>/dev/null && echo "  restored artifacts/" || echo "  no artifacts/ yet"
            git reset HEAD . 2>/dev/null || true
          else
            echo "No state branch — overnight has nothing to review"
            exit 0
          fi

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install anthropic openai google-generativeai

      - name: Run Budget Overnight (Premium Teacher)
        run: |
          ARGS="--budget --verbose"
          if [ "${{ github.event.inputs.deep_review }}" = "true" ]; then
            ARGS="$ARGS --deep-review"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python overnight_v20.py $ARGS 2>&1 | tee budget_overnight_output.txt

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: budget-overnight-${{ github.run_number }}
          path: |
            budget_overnight_output.txt
            artifacts/
          retention-days: 21

      - name: Persist state to state branch
        if: success()
        run: |
          mkdir -p /tmp/orca-state
          cp orca_v20.db /tmp/orca-state/ 2>/dev/null || true
          cp -r state/ /tmp/orca-state/state/ 2>/dev/null || true
          cp -r artifacts/ /tmp/orca-state/artifacts/ 2>/dev/null || true

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          if git ls-remote --heads origin state | grep -q state; then
            git checkout state
            git pull origin state
          else
            git checkout --orphan state
            git rm -rf . 2>/dev/null || true
            echo "# ORCA v20 Budget Sprint State" > README.md
          fi

          cp /tmp/orca-state/orca_v20.db . 2>/dev/null || true
          cp -r /tmp/orca-state/state/ . 2>/dev/null || true
          cp -r /tmp/orca-state/artifacts/ . 2>/dev/null || true

          git add orca_v20.db state/ artifacts/ README.md 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No state changes to commit"
          else
            git commit -m "Budget overnight #${{ github.run_number }} — $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push origin state
          fi
